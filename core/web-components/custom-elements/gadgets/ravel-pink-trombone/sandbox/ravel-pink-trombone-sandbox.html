<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>ravel-pink-trombone sandbox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen&family=Quantico:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <script type="module" src="../ravel-pink-trombone.ts"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --ground:        #303030;
      --well:          #222222;
      --muted:         #666666;
      --rule:          rgba(102,102,102,.30);
      --accent:        #FF4FB3;
      --fluoro-pink:   #FF37A8;
      --fluoro-lime:   #A7FF00;
      --fluoro-cyan:   #00F0FF;
      --fluoro-orange: #FE6810;
    }

    body {
      margin: 0;
      padding: 40px 44px;
      background: #181818;
      font-family: 'Silkscreen', monospace;
      font-size: 1rem;
      line-height: 1.4;
      color: #E6E2D3;
      border: 10px solid #ff0000;
      box-shadow: 0px 0px 0px 10px inset #ffcc00;
      min-height: 100vh;
    }

    h1 {
      font-size: 3rem;
      color: #ffffff;
      margin: 0 0 8px 0;
      border-bottom: 10px solid var(--accent);
      display: inline-block;
      padding-bottom: 2px;
    }

    .subtitle {
      font-family: 'Quantico', monospace;
      font-size: 1rem;
      color: var(--muted);
      margin: 0 0 40px 0;
    }

    /* ── Layout ─────────────────────────────────────────────── */
    .element-col  { display: flex; flex-direction: column; gap: 32px; }
    .element-cell { display: flex; flex-direction: column; gap: 8px; }
    .element-label { font-size: 1rem; color: var(--muted); }

    /* ── Stage ──────────────────────────────────────────────── */
    .stage {
      position: relative;
      background: var(--well);
      border: 2px dotted var(--rule);
      border-radius: 4px;
      overflow: hidden;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Panel ──────────────────────────────────────────────── */
    .panel {
      background: var(--ground);
      border: 2px dotted var(--rule);
      border-radius: 4px;
      padding: 18px 20px;
    }

    /* ── Preset pills ───────────────────────────────────────── */
    .presets {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    .preset-btn {
      background: transparent;
      border: 1px solid var(--rule);
      border-radius: 14px;
      padding: 4px 12px;
      font-family: 'Silkscreen', monospace;
      font-size: 0.8rem;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.12s, border-color 0.12s;
    }
    .preset-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Sliders ────────────────────────────────────────────── */
    .slider-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field-label {
      font-family: 'Quantico', monospace;
      font-size: 0.85rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: flex;
      justify-content: space-between;
    }
    .field-label span { color: #E6E2D3; font-variant-numeric: tabular-nums; }
    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
      height: 18px;
    }

    /* ── Buttons ────────────────────────────────────────────── */
    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .ctrl-btn {
      background: transparent;
      border: 1px solid var(--rule);
      border-radius: 4px;
      padding: 6px 14px;
      font-family: 'Silkscreen', monospace;
      font-size: 0.8rem;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.12s, border-color 0.12s;
      white-space: nowrap;
    }
    .ctrl-btn:hover            { color: var(--accent); border-color: var(--accent); }
    .ctrl-btn.start            { color: var(--fluoro-lime); border-color: var(--fluoro-lime); }
    .ctrl-btn.start:hover      { background: rgba(167,255,0,0.08); }
    .ctrl-btn.running          { color: var(--fluoro-cyan); border-color: var(--fluoro-cyan); }
    .ctrl-btn.spacer           { margin-left: auto; }

    /* ── Event log ──────────────────────────────────────────── */
    #log {
      height: 120px;
      overflow-y: auto;
      font-family: 'Quantico', monospace;
      font-size: 0.85rem;
      background: #111111;
      border: 1px solid var(--rule);
      border-radius: 4px;
      padding: 6px 10px;
    }
    .log-line       { padding: 1px 0; color: #444; }
    .log-line.info  { color: #556; }
    .log-line.sent  { color: #7755aa; }
    .log-line.ready { color: var(--fluoro-lime); }
    .log-line.error { color: var(--fluoro-pink); }
    .log-line.event { color: #446688; }
  </style>
</head>
<body>

  <h1>ravel-pink-trombone</h1>
  <p class="subtitle">Web Audio vocal synthesizer · AudioWorklet glottis + tract model</p>

  <div class="element-col">

    <!-- ── Component stage ─────────────────────────────────── -->
    <div class="element-cell">
      <div class="element-label">element</div>
      <div class="stage">
        <ravel-pink-trombone id="trombone" w="440" h="140"></ravel-pink-trombone>
      </div>
    </div>

    <!-- ── Transport ───────────────────────────────────────── -->
    <div class="element-cell">
      <div class="element-label">transport</div>
      <div class="panel">
        <div class="btn-row">
          <button class="ctrl-btn start" id="btn-start">Start audio</button>
          <button class="ctrl-btn" id="btn-stop">Stop audio</button>
          <button class="ctrl-btn" id="btn-send">Send params via message</button>
          <button class="ctrl-btn spacer" id="btn-clear-log">Clear log</button>
        </div>
      </div>
    </div>

    <!-- ── Parameters ──────────────────────────────────────── -->
    <div class="element-cell">
      <div class="element-label">parameters</div>
      <div class="panel">
        <div class="presets">
          <button class="preset-btn" data-preset="neutral">neutral</button>
          <button class="preset-btn" data-preset="a">vowel /ɑ/</button>
          <button class="preset-btn" data-preset="e">vowel /e/</button>
          <button class="preset-btn" data-preset="i">vowel /i/</button>
          <button class="preset-btn" data-preset="u">vowel /u/</button>
          <button class="preset-btn" data-preset="breathy">breathy</button>
          <button class="preset-btn" data-preset="pressed">pressed</button>
          <button class="preset-btn" data-preset="whisper">whisper</button>
          <button class="preset-btn" data-preset="high">high pitch</button>
          <button class="preset-btn" data-preset="low">low pitch</button>
        </div>
        <div class="slider-grid">
          <div class="field">
            <div class="field-label">Frequency (Hz)<span id="lbl-freq">140</span></div>
            <input type="range" id="sl-freq" min="80" max="1100" step="1" value="140">
          </div>
          <div class="field">
            <div class="field-label">Tenseness<span id="lbl-tens">0.60</span></div>
            <input type="range" id="sl-tens" min="0" max="1" step="0.01" value="0.6">
          </div>
          <div class="field">
            <div class="field-label">Intensity<span id="lbl-int">1.00</span></div>
            <input type="range" id="sl-int" min="0" max="1" step="0.01" value="1.0">
          </div>
          <div class="field">
            <div class="field-label">Loudness<span id="lbl-loud">0.50</span></div>
            <input type="range" id="sl-loud" min="0" max="1" step="0.01" value="0.5">
          </div>
          <div class="field">
            <div class="field-label">Tongue index<span id="lbl-tidx">12.90</span></div>
            <input type="range" id="sl-tidx" min="12" max="29" step="0.1" value="12.9">
          </div>
          <div class="field">
            <div class="field-label">Tongue diameter<span id="lbl-tdia">2.43</span></div>
            <input type="range" id="sl-tdia" min="2.05" max="3.5" step="0.01" value="2.43">
          </div>
        </div>
      </div>
    </div>

    <!-- ── Attribute control ────────────────────────────────── -->
    <div class="element-cell">
      <div class="element-label">live attributes</div>
      <div class="panel">
        <div class="btn-row">
          <button class="ctrl-btn start" id="btn-attr-start">Set active</button>
          <button class="ctrl-btn" id="btn-attr-stop">Remove active</button>
          <button class="ctrl-btn" id="btn-attr-freq">frequency="440"</button>
        </div>
      </div>
    </div>

    <!-- ── Event log ─────────────────────────────────────────── -->
    <div class="element-cell">
      <div class="element-label">event log</div>
      <div id="log"></div>
    </div>

  </div>

  <script type="module">
    const el  = document.getElementById('trombone');
    const log = document.getElementById('log');

    // ── Presets ──────────────────────────────────────────────────
    const PRESETS = {
      neutral: { frequency: 140,  tenseness: 0.6,  intensity: 1.0, loudness: 0.5, tongue: { index: 12.9, diameter: 2.43 } },
      a:       { frequency: 140,  tenseness: 0.6,  intensity: 1.0, loudness: 0.5, tongue: { index: 13.0, diameter: 2.43 } },
      e:       { frequency: 160,  tenseness: 0.65, intensity: 1.0, loudness: 0.5, tongue: { index: 20.0, diameter: 3.00 } },
      i:       { frequency: 200,  tenseness: 0.7,  intensity: 1.0, loudness: 0.5, tongue: { index: 27.0, diameter: 3.50 } },
      u:       { frequency: 140,  tenseness: 0.65, intensity: 1.0, loudness: 0.5, tongue: { index: 23.0, diameter: 2.05 } },
      breathy: { frequency: 160,  tenseness: 0.2,  intensity: 0.8, loudness: 0.5, tongue: { index: 15.0, diameter: 2.8  } },
      pressed: { frequency: 140,  tenseness: 0.9,  intensity: 1.0, loudness: 0.5, tongue: { index: 12.9, diameter: 2.43 } },
      whisper: { frequency: 140,  tenseness: 0.3,  intensity: 0.4, loudness: 0.4, tongue: { index: 14.0, diameter: 2.6  } },
      high:    { frequency: 550,  tenseness: 0.65, intensity: 1.0, loudness: 0.5, tongue: { index: 20.0, diameter: 3.0  } },
      low:     { frequency: 90,   tenseness: 0.6,  intensity: 1.0, loudness: 0.5, tongue: { index: 12.9, diameter: 2.43 } },
    };

    // ── Sliders ──────────────────────────────────────────────────
    const sliders = {
      freq: { el: document.getElementById('sl-freq'), lbl: document.getElementById('lbl-freq'), fmt: v => String(Math.round(v)) },
      tens: { el: document.getElementById('sl-tens'), lbl: document.getElementById('lbl-tens'), fmt: v => v.toFixed(2) },
      int:  { el: document.getElementById('sl-int'),  lbl: document.getElementById('lbl-int'),  fmt: v => v.toFixed(2) },
      loud: { el: document.getElementById('sl-loud'), lbl: document.getElementById('lbl-loud'), fmt: v => v.toFixed(2) },
      tidx: { el: document.getElementById('sl-tidx'), lbl: document.getElementById('lbl-tidx'), fmt: v => v.toFixed(2) },
      tdia: { el: document.getElementById('sl-tdia'), lbl: document.getElementById('lbl-tdia'), fmt: v => v.toFixed(2) },
    };

    function getCurrentParams() {
      return {
        frequency: parseFloat(document.getElementById('sl-freq').value),
        tenseness: parseFloat(document.getElementById('sl-tens').value),
        intensity: parseFloat(document.getElementById('sl-int').value),
        loudness:  parseFloat(document.getElementById('sl-loud').value),
        tongue: {
          index:    parseFloat(document.getElementById('sl-tidx').value),
          diameter: parseFloat(document.getElementById('sl-tdia').value),
        },
      };
    }

    function sendParams(params, source = 'slider') {
      window.dispatchEvent(new CustomEvent('ravel-pink-trombone', {
        detail: { cmd: 'params', content: params }
      }));
      addLog(
        `sent params  freq=${Math.round(params.frequency)} tens=${params.tenseness.toFixed(2)} int=${params.intensity.toFixed(2)} tongue=[${params.tongue.index.toFixed(1)}, ${params.tongue.diameter.toFixed(2)}]  (${source})`,
        'sent',
      );
    }

    Object.values(sliders).forEach(cfg => {
      cfg.el.addEventListener('input', () => {
        cfg.lbl.textContent = cfg.fmt(parseFloat(cfg.el.value));
        sendParams(getCurrentParams(), 'slider');
      });
    });

    function applyPreset(key) {
      const p = PRESETS[key];
      if (!p) return;
      document.getElementById('sl-freq').value = p.frequency;
      document.getElementById('sl-tens').value = p.tenseness;
      document.getElementById('sl-int').value  = p.intensity;
      document.getElementById('sl-loud').value = p.loudness;
      document.getElementById('sl-tidx').value = p.tongue.index;
      document.getElementById('sl-tdia').value = p.tongue.diameter;
      sliders.freq.lbl.textContent = sliders.freq.fmt(p.frequency);
      sliders.tens.lbl.textContent = sliders.tens.fmt(p.tenseness);
      sliders.int.lbl.textContent  = sliders.int.fmt(p.intensity);
      sliders.loud.lbl.textContent = sliders.loud.fmt(p.loudness);
      sliders.tidx.lbl.textContent = sliders.tidx.fmt(p.tongue.index);
      sliders.tdia.lbl.textContent = sliders.tdia.fmt(p.tongue.diameter);
      sendParams(p, `preset:${key}`);
    }

    document.querySelectorAll('.preset-btn').forEach(btn => {
      btn.addEventListener('click', () => applyPreset(btn.dataset.preset));
    });

    // ── Transport ─────────────────────────────────────────────────
    const startBtn = document.getElementById('btn-start');
    const stopBtn  = document.getElementById('btn-stop');

    startBtn.addEventListener('click', () => {
      window.dispatchEvent(new CustomEvent('ravel-pink-trombone', { detail: { cmd: 'start' } }));
      startBtn.classList.add('running');
      stopBtn.classList.remove('running');
      addLog('dispatched  cmd=start', 'info');
    });

    stopBtn.addEventListener('click', () => {
      window.dispatchEvent(new CustomEvent('ravel-pink-trombone', { detail: { cmd: 'stop' } }));
      stopBtn.classList.add('running');
      startBtn.classList.remove('running');
      addLog('dispatched  cmd=stop', 'info');
    });

    document.getElementById('btn-send').addEventListener('click', () => {
      sendParams(getCurrentParams(), 'button');
    });

    // ── Attribute control ─────────────────────────────────────────
    document.getElementById('btn-attr-start').addEventListener('click', () => {
      el.setAttribute('active', '');
      addLog('setAttribute  active=""', 'info');
    });
    document.getElementById('btn-attr-stop').addEventListener('click', () => {
      el.removeAttribute('active');
      addLog('removeAttribute  active', 'info');
    });
    document.getElementById('btn-attr-freq').addEventListener('click', () => {
      el.setAttribute('frequency', '440');
      document.getElementById('sl-freq').value = '440';
      sliders.freq.lbl.textContent = '440';
      addLog('setAttribute  frequency="440"', 'info');
    });

    // ── Broadcasts from element ───────────────────────────────────
    window.addEventListener('ravel-pink-trombone', (e) => {
      const { cmd, content } = e.detail ?? {};
      if (cmd === 'ready') {
        addLog(`event  cmd=ready  sampleRate=${content?.sampleRate}`, 'ready');
      } else if (cmd === 'error') {
        addLog(`event  cmd=error  ${content?.message}`, 'error');
      } else if (cmd !== 'params' && cmd !== 'start' && cmd !== 'stop' && cmd) {
        addLog(`event  cmd=${cmd}  ${JSON.stringify(content ?? {})}`, 'event');
      }
    });

    // ── Log helper ────────────────────────────────────────────────
    function addLog(text, cls = '') {
      const d = document.createElement('div');
      d.className = 'log-line ' + cls;
      const t = new Date().toLocaleTimeString('en', { hour12: false });
      d.textContent = `[${t}] ${text}`;
      log.prepend(d);
    }

    document.getElementById('btn-clear-log').addEventListener('click', () => {
      log.innerHTML = '';
    });

    addLog('sandbox ready — click Start Audio to begin synthesis', 'info');
  </script>

</body>
</html>
