<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ravel-playlist sandbox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen&family=Quantico:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <script src="/core/libs/p5.min.js"></script>
  <script type="module" src="/index.ts"></script>
  <style>
    * { box-sizing: border-box; }

    :root {
      --ground: #303030;
      --well:   #1a1a1a;
      --muted:  #666666;
      --rule:   rgba(102,102,102,.40);
      --accent: #FF37A8;
    }

    body {
      margin: 0;
      padding: 40px 44px;
      background: var(--ground);
      color: var(--text);
      font-family: 'Silkscreen', monospace;
      font-size: 1rem;
      line-height: 1.55;
      border: 10px solid #ff0000;
      box-shadow: 0px 0px 0px 10px inset #ffcc00;
    }

    h1 {
      font-size: 2rem;
      color: #ffffff;
      margin: 0 0 32px 0;
      border-bottom: 10px solid var(--accent);
      display: inline-block;
      padding-bottom: 2px;
    }

    .playlist-row {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
      align-items: flex-start;
    }

    .playlist-cell {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .playlist-label {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .stage {
      position: relative;
      background: var(--well);
      border: 2px dotted var(--rule);
      border-radius: 4px;
      overflow: hidden;
      padding: 14px;
    }
  </style>
</head>
<body>

  <h1>ravel-playlist</h1>

  <div class="playlist-row">

    <div class="playlist-cell">
      <div class="playlist-label">Golem / GNYO / MZO</div>
      <div class="stage">
        <ravel-playlist loop>
          <ravel-sound show-time source="./_twily-luxen/twily-luxen-git-masters/gnyo-1.wav"></ravel-sound>
          <ravel-sound show-time source="./_twily-luxen/twily-luxen-git-masters/gnyo-2.wav"></ravel-sound>
          <ravel-sound show-time source="./_twily-luxen/twily-luxen-git-masters/gnyo-4.wav"></ravel-sound>
          <ravel-sound show-time source="./_twily-luxen/twily-luxen-git-masters/gnyo-5.wav"></ravel-sound>
          <ravel-sound show-time source="./_twily-luxen/twily-luxen-git-masters/gnyo-18.wav"></ravel-sound>
          <ravel-sound show-time source="./_twily-luxen/twily-luxen-git-masters/the-golem-1.wav"></ravel-sound>
          <ravel-sound show-time source="./_twily-luxen/twily-luxen-git-masters/the-golem-8.wav"></ravel-sound>
          <ravel-sound show-time source="./_twily-luxen/twily-luxen-git-masters/mzo-4.wav"></ravel-sound>
          <ravel-sound show-time source="./_twily-luxen/twily-luxen-git-masters/mzo-11.mp3"></ravel-sound>
          <ravel-sound show-time source="./_twily-luxen/twily-luxen-git-masters/mzo-18.wav"></ravel-sound>
        </ravel-playlist>
      </div>
    </div>

  </div>

</body>
</html>
