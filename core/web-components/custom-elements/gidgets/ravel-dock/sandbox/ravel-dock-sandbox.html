<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0,user-scalable=0"/>
    <title>Assembly Test</title>
    <meta name="description" content="Ravel">
    
    <link rel="stylesheet" href="../../../../../../styles/styles.css">
    <script src="../../../../../../core/libs/Box2d.min.js"></script>
    <!-- Load libraries <script type="text/javascript" src="./libs/foo.js"></script> -->
    <script type="module" src="../../../../index.js?version=1.0"></script>
    <style>
        body {
            margin: 0px;
        }
        #page-wrapper {
            position: absolute;
            top: 0px;
            left: 0px;
            width: 100vw;
            height: 100vh;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none; /* Allow clicks to pass through */
        }
        #page-wrapper > * {
            pointer-events: auto; /* Restore pointer events for its children */
        }
        #dock-wrapper {
            position: absolute;
            top: 0px;
            left: 0px;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
    <ravel-dock id="dock-wrapper" label="main-menu"></ravel-dock>
<div id="page-wrapper">
    <ravel-assembly label="foo" icon="🐼" docked dock-target="main-menu" size="24">
        <ravel-switch states="2" state-icons="⛔️,🟢" state-signals="on,off" signals-in="🐼,🟢" size="48"></ravel-switch>
        <ravel-switch states="2" state-icons="⛔️,🟢" state-signals="on,off" signals-in="🐼,🟪" size="48"></ravel-switch><br/>
        <ravel-switch states="3" state-icons="⛔️,🟢,🟪" state-signals="on,off,on" signals-in="🐼,🟢,🟪" size="48"></ravel-switch>
    </ravel-assembly>
    <ravel-assembly label="foo2" icon="🐼" docked dock-target="main-menu" size="24">
        <ravel-switch states="2" state-icons="⛔️,🟢" state-signals="on,off" size="48"></ravel-switch>
        <ravel-switch states="2" state-icons="⛔️,🟢" state-signals="on,off" size="48"></ravel-switch><br/>
        <ravel-switch states="3" state-icons="⛔️,🟢,🟪" state-signals="on,off,on" size="48"></ravel-switch>
    </ravel-assembly>
    <ravel-signal-collector></ravel-signal-collector>
</div>
<ravel-dock id="collectors-dock" label="collectors"></ravel-dock>
</body>

</html>
