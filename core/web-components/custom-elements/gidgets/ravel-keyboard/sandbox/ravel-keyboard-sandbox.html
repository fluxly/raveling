<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ravel-keyboard — sandbox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen&family=Quantico:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Silkscreen', monospace;
            background: #181818;
            color: #E6E2D3;
            padding: 32px;
            border: 10px solid #ff0000;
            box-shadow: 0 0 0 10px inset #ffcc00;
            min-height: 100vh;
        }

        h1 {
            font-size: 3rem;
            color: #FFFFFF;
            border-bottom: 10px solid rgba(102,102,102,0.30);
            padding-bottom: 16px;
            margin-bottom: 32px;
        }

        h2 { font-size: 1.25rem; color: #FFFFFF; margin-bottom: 14px; }

        .section {
            background: #303030;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .element-label { font-size: 1rem; color: #666666; margin-bottom: 10px; }

        .stage {
            position: relative;
            background: #222222;
            border: 2px dotted rgba(102,102,102,0.40);
            border-radius: 4px;
            padding: 24px 24px 20px;
            overflow-x: auto;
        }

        /* ── Controls bar ───────────────────────────────── */

        .controls {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .ctrl {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ctrl-label {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.40);
            letter-spacing: 0.06em;
            white-space: nowrap;
        }

        .ctrl-slider {
            width: 100px;
            accent-color: #20C8D8;
        }

        .ctrl-val {
            font-size: 0.75rem;
            color: #20C8D8;
            min-width: 28px;
        }

        .ctrl-select {
            background: #181818;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 4px;
            color: #E6E2D3;
            font-family: 'Silkscreen', monospace;
            font-size: 0.7rem;
            padding: 4px 8px;
        }

        .ctrl-select:focus { outline: 2px solid rgba(32,200,216,0.5); outline-offset: 1px; }

        .toggle-label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.55);
        }

        /* ── MIDI log ───────────────────────────────────── */

        .midi-log {
            background: #0a0a0a;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 6px;
            padding: 10px 12px;
            height: 180px;
            overflow-y: auto;
            font-family: 'Quantico', monospace;
            font-size: 0.83rem;
            color: rgba(255,255,255,0.40);
            display: flex;
            flex-direction: column-reverse;
            gap: 2px;
        }

        .log-on   { color: #A7FF00; }
        .log-off  { color: rgba(255,255,255,0.30); }
        .log-sys  { color: rgba(255,255,255,0.20); font-style: italic; }

        .btn-clear {
            appearance: none;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 4px;
            color: rgba(255,255,255,0.45);
            font-family: 'Silkscreen', monospace;
            font-size: 0.7rem;
            padding: 4px 10px;
            cursor: pointer;
            margin-top: 8px;
            float: right;
        }

        .btn-clear:hover { background: rgba(255,255,255,0.12); color: #E6E2D3; }

        /* ── Broker row ─────────────────────────────────── */

        .broker-row {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .info {
            font-family: 'Quantico', monospace;
            font-size: 0.88rem;
            color: rgba(255,255,255,0.40);
            line-height: 1.6;
            margin-bottom: 14px;
        }
    </style>
</head>
<body>
    <h1>ravel-keyboard</h1>

    <!-- Default (C4–B5) -->
    <div class="section">
        <div class="element-label">ravel-keyboard</div>
        <div class="stage">
            <ravel-keyboard id="kb"></ravel-keyboard>

            <div class="controls">
                <div class="ctrl">
                    <span class="ctrl-label">FROM</span>
                    <input type="range" class="ctrl-slider" id="sl-from" min="21" max="108" value="60" aria-label="Start note">
                    <span class="ctrl-val" id="val-from">C4 (60)</span>
                </div>
                <div class="ctrl">
                    <span class="ctrl-label">TO</span>
                    <input type="range" class="ctrl-slider" id="sl-to" min="21" max="108" value="83" aria-label="End note">
                    <span class="ctrl-val" id="val-to">B5 (83)</span>
                </div>
                <div class="ctrl">
                    <span class="ctrl-label">VELOCITY</span>
                    <input type="range" class="ctrl-slider" id="sl-vel" min="1" max="127" value="100" aria-label="Velocity">
                    <span class="ctrl-val" id="val-vel">100</span>
                </div>
                <div class="ctrl">
                    <span class="ctrl-label">MIDI CH</span>
                    <select class="ctrl-select" id="sel-ch" aria-label="MIDI channel">
                        <option value="0">CH 1</option>
                        <option value="1">CH 2</option>
                        <option value="2">CH 3</option>
                        <option value="9">CH 10</option>
                    </select>
                </div>
                <label class="ctrl toggle-label">
                    <input type="checkbox" id="chk-labels" checked aria-label="Show note labels">
                    LABELS
                </label>
            </div>
        </div>
    </div>

    <!-- Full MIDI chain: keyboard → broker → gadget -->
    <div class="section">
        <h2>MIDI Chain</h2>
        <p class="info">
            Notes flow: ravel-keyboard → ravel-midi-broker → ravel-midi-gadget → IAC / hardware.<br>
            Connect MIDI in the gadget to send to a DAW.
        </p>
        <div class="broker-row">
            <ravel-midi-broker id="broker" channel="kb-monitor"></ravel-midi-broker>
            <ravel-midi-gadget id="gadget" output="IAC"></ravel-midi-gadget>
        </div>
    </div>

    <!-- Event log -->
    <div class="section">
        <h2>Event Log</h2>
        <div class="midi-log" id="log" aria-live="polite" aria-label="Note event log">
            <span class="log-sys">Play a key to see events…</span>
        </div>
        <button class="btn-clear" id="btn-clear" type="button">CLEAR</button>
        <div style="clear:both"></div>
    </div>

    <script type="module">
        import '../ravel-keyboard.ts';
        import '../../../brokers/ravel-midi-broker/ravel-midi-broker.ts';
        import '../../../gadgets/ravel-midi-gadget/ravel-midi-gadget.ts';

        const kb      = document.getElementById('kb');
        const log     = document.getElementById('log');
        const NAMES   = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
        const noteName = n => `${NAMES[n % 12]}${Math.floor(n / 12) - 1}`;
        let   logEmpty = true;

        function addLog(text, cls) {
            if (logEmpty) { log.innerHTML = ''; logEmpty = false; }
            const e = document.createElement('div');
            e.className = cls;
            const d = new Date();
            const ts = `${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}.${String(d.getMilliseconds()).padStart(3,'0')}`;
            e.textContent = `[${ts}] ${text}`;
            log.prepend(e);
            while (log.children.length > 120) log.removeChild(log.lastChild);
        }

        // DOM events from the element
        kb.addEventListener('note-on', e => {
            addLog(`NOTE-ON   ${noteName(e.detail.note).padEnd(3)} (${e.detail.note})  vel:${e.detail.velocity}`, 'log-on');
        });
        kb.addEventListener('note-off', e => {
            addLog(`note-off  ${noteName(e.detail.note).padEnd(3)} (${e.detail.note})`, 'log-off');
        });

        // Broker broadcasts (after broker parses the note-on/off that came in via pub/sub)
        window.addEventListener('kb-monitor', e => {
            const { cmd, content } = e.detail ?? {};
            if (cmd === 'note-on' || cmd === 'note-off') return; // already shown above
        });

        document.getElementById('btn-clear').addEventListener('click', () => {
            log.innerHTML = '<div class="log-sys">Cleared.</div>';
            logEmpty = false;
        });

        // ── Controls ─────────────────────────────────────────────────────────

        const slFrom  = document.getElementById('sl-from');
        const slTo    = document.getElementById('sl-to');
        const slVel   = document.getElementById('sl-vel');
        const valFrom = document.getElementById('val-from');
        const valTo   = document.getElementById('val-to');
        const valVel  = document.getElementById('val-vel');

        function updateFrom() {
            const n = parseInt(slFrom.value);
            valFrom.textContent = `${noteName(n)} (${n})`;
            kb.setAttribute('from', n);
        }

        function updateTo() {
            const n = parseInt(slTo.value);
            valTo.textContent = `${noteName(n)} (${n})`;
            kb.setAttribute('to', n);
        }

        slFrom.addEventListener('input', () => {
            if (parseInt(slFrom.value) >= parseInt(slTo.value)) {
                slTo.value = String(parseInt(slFrom.value) + 1);
                updateTo();
            }
            updateFrom();
        });

        slTo.addEventListener('input', () => {
            if (parseInt(slTo.value) <= parseInt(slFrom.value)) {
                slFrom.value = String(parseInt(slTo.value) - 1);
                updateFrom();
            }
            updateTo();
        });

        slVel.addEventListener('input', () => {
            valVel.textContent = slVel.value;
            kb.setAttribute('velocity', slVel.value);
        });

        document.getElementById('sel-ch').addEventListener('change', e => {
            kb.setAttribute('midi-ch', e.target.value);
        });

        document.getElementById('chk-labels').addEventListener('change', e => {
            kb.setAttribute('labels', e.target.checked ? 'on' : 'off');
        });
    </script>
</body>
</html>
