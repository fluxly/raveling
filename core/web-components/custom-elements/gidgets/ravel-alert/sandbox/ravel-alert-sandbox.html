<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ravel-alert sandbox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen&family=Quantico:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <script src="/core/libs/p5.min.js"></script>
  <script type="module" src="/index.ts"></script>
  <style>
    * { box-sizing: border-box; }

    :root {
      --ground:  #303030;
      --well:    #1a1a1a;
      --muted:   #666666;
      --rule:    rgba(102,102,102,.40);
      --fluoro-pink:   #FF37A8;
      --fluoro-orange: #FE6810;
      --fluoro-lime:   #A7FF00;
      --fluoro-cyan:   #00F0FF;
    }

    body {
      margin: 0;
      padding: 40px 44px;
      background: var(--ground);
      font-family: 'Silkscreen', monospace;
      font-size: 1rem;
      line-height: 1.55;
      border: 10px solid #ff0000;
      box-shadow: 0px 0px 0px 10px inset #ffcc00;
      min-height: 100vh;
    }

    h1 {
      font-size: 2rem;
      color: #ffffff;
      margin: 0 0 32px 0;
      border-bottom: 10px solid var(--fluoro-pink);
      display: inline-block;
      padding-bottom: 2px;
    }

    .element-col { display: flex; flex-direction: column; gap: 32px; }

    .element-cell { display: flex; flex-direction: column; gap: 8px; }

    .element-label { font-size: 0.85rem; color: var(--muted); }

    .stage {
      position: relative;
      background: var(--well);
      border: 2px dotted var(--rule);
      border-radius: 4px;
      overflow: hidden;
      padding: 20px;
    }

    /* ── Scenario trigger buttons ──────────────────────────── */
    .scenario-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .scenario-btn {
      border: none;
      border-radius: 4px;
      padding: 10px 20px;
      font: inherit;
      font-size: 0.85rem;
      cursor: pointer;
      transition: filter 0.12s;
      color: #181818;
    }
    .scenario-btn:hover { filter: brightness(1.2); }

    .scenario-btn.red    { background: var(--fluoro-pink); }
    .scenario-btn.yellow { background: var(--fluoro-orange); color: #ffffff; }
    .scenario-btn.green  { background: var(--fluoro-lime); }
    .scenario-btn.blue   { background: var(--fluoro-cyan); }

    /* ── Custom controls panel ─────────────────────────────── */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 520px;
    }

    .controls-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: flex-end;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field-label {
      font-size: 0.75rem;
      color: var(--muted);
    }

    input[type="text"], select {
      background: #222222;
      border: 1px solid rgba(102,102,102,.5);
      border-radius: 4px;
      color: #E6E2D3;
      padding: 5px 8px;
      font: inherit;
      font-size: 0.8rem;
      outline: none;
    }

    input[type="text"]:focus, select:focus {
      border-color: var(--fluoro-cyan);
    }

    .check-row {
      display: flex;
      gap: 14px;
      align-items: center;
      color: var(--muted);
      font-size: 0.8rem;
      flex-wrap: wrap;
    }

    .check-row label {
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
    }

    button.fire {
      background: var(--fluoro-cyan);
      color: #181818;
      border: none;
      border-radius: 4px;
      padding: 8px 20px;
      font: inherit;
      font-size: 0.85rem;
      cursor: pointer;
    }
    button.fire:hover { filter: brightness(1.15); }

    hr { border: none; border-top: 2px solid var(--rule); margin: 4px 0; }

    /* ── Event log ─────────────────────────────────────────── */
    #log {
      max-height: 100px;
      overflow-y: auto;
      font-size: 0.75rem;
      background: #111111;
      border: 1px solid var(--rule);
      border-radius: 4px;
      padding: 6px 8px;
    }

    .log-line          { padding: 2px 0; color: var(--muted); }
    .log-line.show     { color: var(--fluoro-cyan); }
    .log-line.cancel   { color: var(--fluoro-orange); }
    .log-line.ok       { color: var(--fluoro-lime); }
    .log-line.continue { color: var(--fluoro-cyan); }
    .log-line.dissolve { color: var(--muted); font-style: italic; }
  </style>
</head>
<body>

  <!-- ravel-alert lives at page level (position: fixed) -->
  <ravel-alert id="alert"></ravel-alert>

  <h1>ravel-alert</h1>

  <div class="element-col">

    <div class="element-cell">
      <div class="element-label">preset scenarios — with buttons</div>
      <div class="stage">
        <div class="scenario-row">
          <button class="scenario-btn red"    data-color="red"    data-text="Something went wrong. Would you like to try again?"  data-buttons="cancel,ok">Error</button>
          <button class="scenario-btn yellow" data-color="yellow" data-text="This action may have unintended effects. Continue?"   data-buttons="cancel,continue">Warning</button>
          <button class="scenario-btn green"  data-color="green"  data-text="Operation completed successfully."                   data-buttons="ok">Success</button>
          <button class="scenario-btn blue"   data-color="blue"   data-text="A new version is available. Update now?"             data-buttons="cancel,continue">Info</button>
        </div>
      </div>
    </div>

    <div class="element-cell">
      <div class="element-label">interstitial — auto-dissolves</div>
      <div class="stage">
        <div class="scenario-row">
          <button class="scenario-btn green"  data-color="green"  data-text="Changes saved."              data-interstitial="1" data-timeout="2000">Saved 2s</button>
          <button class="scenario-btn blue"   data-color="blue"   data-text="Syncing with server…"        data-interstitial="1" data-timeout="3000">Sync 3s</button>
          <button class="scenario-btn yellow" data-color="yellow" data-text="Reconnecting, please wait…"  data-interstitial="1" data-timeout="5000">Reconnecting 5s</button>
          <button class="scenario-btn red"    data-color="red"    data-text="Connection lost."             data-interstitial="1" data-timeout="4000">Error 4s</button>
        </div>
      </div>
    </div>

    <div class="element-cell">
      <div class="element-label">custom alert</div>
      <div class="stage">
        <div class="controls">
          <div class="controls-row">
            <div class="field" style="flex:1">
              <div class="field-label">message</div>
              <input type="text" id="inp-text" value="Are you sure you want to do this?">
            </div>
            <div class="field">
              <div class="field-label">color</div>
              <select id="inp-color">
                <option value="blue">blue</option>
                <option value="red">red</option>
                <option value="yellow">yellow</option>
                <option value="green">green</option>
              </select>
            </div>
          </div>

          <div class="check-row">
            <span>buttons</span>
            <label><input type="checkbox" id="chk-cancel"   value="cancel">   cancel</label>
            <label><input type="checkbox" id="chk-ok"       value="ok" checked> ok</label>
            <label><input type="checkbox" id="chk-continue" value="continue"> continue</label>
          </div>

          <div class="controls-row">
            <label class="check-row" style="gap:6px">
              <input type="checkbox" id="chk-interstitial">
              interstitial
            </label>
            <div class="field">
              <div class="field-label">timeout ms</div>
              <input type="text" id="inp-timeout" value="3000" style="width:80px">
            </div>
            <button class="fire" id="btn-show">Show Alert</button>
          </div>

          <hr>
          <div class="field-label">event log</div>
          <div id="log"></div>
        </div>
      </div>
    </div>

  </div>

  <script type="module">
    const logEl = document.getElementById('log');

    function addLog(text, cls = '') {
      const d = document.createElement('div');
      d.className = 'log-line ' + cls;
      const t = new Date().toLocaleTimeString('en', { hour12: false });
      d.textContent = `[${t}] ${text}`;
      logEl.prepend(d);
    }

    function fireAlert(text, color, buttons) {
      window.dispatchEvent(new CustomEvent('ravel-alert', {
        detail: { cmd: 'show', content: { text, color, buttons } }
      }));
      addLog(`show [${color}] "${text.slice(0, 40)}${text.length > 40 ? '…' : ''}"`, 'show');
    }

    function fireInterstitial(text, color, timeout) {
      window.dispatchEvent(new CustomEvent('ravel-alert', {
        detail: { cmd: 'show', content: { text, color, interstitial: true, timeout } }
      }));
      addLog(`interstitial [${color}] ${timeout}ms "${text}"`, 'show');
    }

    document.querySelectorAll('.scenario-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.dataset.interstitial) {
          fireInterstitial(btn.dataset.text, btn.dataset.color, Number(btn.dataset.timeout));
        } else {
          fireAlert(btn.dataset.text, btn.dataset.color, btn.dataset.buttons.split(','));
        }
      });
    });

    document.getElementById('btn-show').addEventListener('click', () => {
      const text         = document.getElementById('inp-text').value;
      const color        = document.getElementById('inp-color').value;
      const interstitial = document.getElementById('chk-interstitial').checked;
      const timeout      = Number(document.getElementById('inp-timeout').value) || 3000;
      if (interstitial) {
        fireInterstitial(text, color, timeout);
      } else {
        const buttons = ['cancel', 'ok', 'continue']
          .filter(b => document.getElementById(`chk-${b}`).checked);
        fireAlert(text, color, buttons);
      }
    });

    window.addEventListener('ravel-alert', (e) => {
      const { cmd, content } = e.detail ?? {};
      if (cmd === 'response') addLog(`response → ${content.button}`, content.button);
      if (cmd === 'dissolve') addLog('dissolved', 'dissolve');
    });
  </script>

</body>
</html>
