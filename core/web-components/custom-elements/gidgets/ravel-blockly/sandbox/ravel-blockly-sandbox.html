<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ravel-blockly sandbox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen&family=Quantico:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <!-- Blockly must be a global before the module script runs -->
  <script src="https://unpkg.com/blockly/blockly.min.js"></script>
  <script src="/core/libs/p5.min.js"></script>
  <script type="module" src="/index.ts"></script>
  <style>
    * { box-sizing: border-box; }

    :root {
      --ground:        #303030;
      --well:          #1a1a1a;
      --muted:         #666666;
      --rule:          rgba(102,102,102,.40);
      --fluoro-pink:   #FF37A8;
      --fluoro-orange: #FE6810;
      --fluoro-lime:   #A7FF00;
      --fluoro-cyan:   #00F0FF;
    }

    body {
      margin: 0;
      padding: 40px 44px;
      background: var(--ground);
      font-family: 'Silkscreen', monospace;
      font-size: 1rem;
      line-height: 1.3;
      border: 10px solid #ff0000;
      box-shadow: 0px 0px 0px 10px inset #ffcc00;
      min-height: 100vh;
    }

    h1 {
      font-size: 2rem;
      color: #ffffff;
      margin: 0 0 32px 0;
      border-bottom: 10px solid var(--fluoro-lime);
      display: inline-block;
      padding-bottom: 2px;
    }

    .element-col { display: flex; flex-direction: column; gap: 32px; }

    .element-cell { display: flex; flex-direction: column; gap: 8px; }

    .element-label { font-size: 0.85rem; color: var(--muted); }

    .stage {
      position: relative;
      background: var(--well);
      border: 2px dotted var(--rule);
      border-radius: 4px;
      overflow: hidden;
    }

    /* ravel-blockly fills its parent; give the stage an explicit height */
    .stage.workspace {
      height: 560px;
      display: flex;
      flex-direction: column;
    }

    .stage.workspace ravel-blockly {
      flex: 1;
      min-height: 0;
    }

    /* ── Toolbar above workspace ───────────────────────────── */
    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid var(--rule);
    }

    .toolbar button {
      background: transparent;
      border: 1px solid var(--rule);
      border-radius: 4px;
      padding: 6px 14px;
      font: inherit;
      font-size: 0.8rem;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.12s, border-color 0.12s;
    }
    .toolbar button:hover {
      color: var(--fluoro-cyan);
      border-color: var(--fluoro-cyan);
    }

    /* ── Code output panel ────────────────────────────────── */
    #code-out {
      margin: 0;
      padding: 12px 16px;
      background: #111111;
      border-top: 1px solid var(--rule);
      font-size: 0.75rem;
      color: var(--fluoro-lime);
      white-space: pre;
      overflow-x: auto;
      min-height: 48px;
      font-family: 'Quantico', monospace;
    }
  </style>
</head>
<body>

  <h1>ravel-blockly</h1>

  <div class="element-col">

    <div class="element-cell">
      <div class="element-label">basic workspace — horizontal toolbox, zelos renderer</div>
      <div class="stage workspace">
        <div class="toolbar">
          <button id="btn-clear">Clear</button>
          <button id="btn-code">Get Code</button>
        </div>
        <ravel-blockly id="blockly1"></ravel-blockly>
        <pre id="code-out">(press Get Code after building something)</pre>
      </div>
    </div>

  </div>

  <script type="module">
    const blockly = document.getElementById('blockly1');
    const codeOut = document.getElementById('code-out');

    document.getElementById('btn-clear').addEventListener('click', () => {
      blockly.clear();
      codeOut.textContent = '(cleared)';
    });

    document.getElementById('btn-code').addEventListener('click', () => {
      const code = blockly.getCode();
      codeOut.textContent = code || '(no code — JS generator not loaded)';
    });
  </script>

</body>
</html>
